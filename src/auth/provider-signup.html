<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Provider Sign Up - UrgentServices</title>
    <link rel="stylesheet" href="/public/styles/main.css">
    <link rel="stylesheet" href="/public/styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card" style="max-width: 600px;">
            <div class="auth-header">
                <span class="provider-badge">Service Provider</span>
                <h1>Grow Your Business</h1>
                <p>Join our network of verified professionals</p>
            </div>

            <form id="provider-signup-form" onsubmit="handleProviderSignup(event)">
                <!-- Business Information -->
                <h3>Business Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Business Name *</label>
                        <input type="text" name="business_name" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Years in Business</label>
                        <input type="number" name="years_in_business" class="form-input" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Business Description</label>
                    <textarea name="business_description" class="form-input" rows="3" placeholder="Tell customers about your services..."></textarea>
                </div>

                <!-- Contact Information -->
                <h3>Contact Information</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">First Name *</label>
                        <input type="text" name="first_name" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Last Name *</label>
                        <input type="text" name="last_name" class="form-input" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-input" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Phone *</label>
                        <input type="tel" name="phone" class="form-input" required>
                    </div>
                </div>

                <!-- Services Offered -->
                <h3>Services You Offer</h3>
                <div class="services-checkbox-grid" id="services-grid">
                    <!-- Dynamically loaded from API -->
                </div>

                <!-- Service Areas -->
                <h3>Service Areas</h3>
                <div class="form-group">
                    <label class="form-label">Cities/Areas you serve</label>
                    <select name="service_areas" class="form-input" multiple size="5" id="service-areas">
                        <!-- Dynamically loaded -->
                    </select>
                    <small>Hold Ctrl/Cmd to select multiple</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Service Radius (miles)</label>
                    <input type="number" name="service_radius" class="form-input" value="25" min="1" max="100">
                </div>

                <!-- Password -->
                <h3>Account Security</h3>
                
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Password *</label>
                        <input type="password" name="password" class="form-input" required id="password">
                        <div class="password-strength" id="password-strength"></div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label">Confirm Password *</label>
                        <input type="password" name="confirm_password" class="form-input" required>
                    </div>
                </div>

                <!-- Terms -->
                <div class="form-checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="/terms.html">Terms of Service</a> and 
                        <a href="/privacy.html">Privacy Policy</a>
                    </label>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="background_check" required>
                    <label for="background_check">
                        I consent to a background check as part of the verification process
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    Create Provider Account
                </button>

                <p class="auth-footer">
                    Already have an account? <a href="/src/auth/login.html">Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <script src="/public/scripts/auth.js"></script>
</body>
</html>
