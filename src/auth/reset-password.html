<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - UrgentServices</title>
    <link rel="stylesheet" href="/public/styles/main.css">
    <link rel="stylesheet" href="/public/styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Set New Password</h1>
                <p>Enter your new password below</p>
            </div>

            <form id="reset-password-form" onsubmit="handleResetPassword(event)">
                <input type="hidden" name="token" id="reset-token">

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="password" class="form-input" required minlength="8">
                    <small>Minimum 8 characters with 1 number and 1 special character</small>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    Reset Password
                </button>
            </form>
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        document.getElementById('reset-token').value = urlParams.get('token');
    </script>
    <script src="/public/scripts/auth.js"></script>
</body>
</html>
