<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - UrgentServices</title>
    <link rel="stylesheet" href="/public/styles/main.css">
    <link rel="stylesheet" href="/public/styles/auth.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your email to receive reset instructions</p>
            </div>

            <form id="forgot-password-form" onsubmit="handleForgotPassword(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-input" required placeholder="your@email.com">
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">
                    Send Reset Link
                </button>

                <div class="auth-links">
                    <a href="/src/auth/login.html">← Back to Login</a>
                </div>
            </form>

            <div id="reset-success" class="success-message" style="display: none;">
                <h3>✅ Check Your Email</h3>
                <p>If an account exists for that email, you'll receive reset instructions.</p>
                <a href="/src/auth/login.html" class="btn btn-secondary">Return to Login</a>
            </div>
        </div>
    </div>

    <script src="/public/scripts/auth.js"></script>
</body>
</html>
